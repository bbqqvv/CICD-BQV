name: MEGA Enterprise Ultimate Workflow

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==========================================
  # TẦNG 1: KIỂM TRA HẠ TẦNG (INFRASTRUCTURE)
  # ==========================================
  IaC-Validation:
    name: 🏗️ Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          echo "✅ Hạ tầng (IaC) đã sẵn sàng."

  # ==========================================
  # TẦNG 2: KIỂM SOÁT CHẤT LƯỢNG (QUALITY GATE)
  # ==========================================
  Linter:
    name: 🔍 Static Code Analysis
    needs: IaC-Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  Secrets-Scan:
    name: 🔑 Secret Scanning
    needs: IaC-Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for common secrets
        run: |
          # Mô phỏng quét mã độc/secrets (Sử dụng grep cơ bản)
          if grep -rE "password|api_key|secret_key" . --exclude-dir=node_modules; then
            echo "⚠️ Cảnh báo: Tìm thấy từ khóa nhạy cảm trong code!"
          fi
          echo "✅ Đã quét xong bí mật."

  Software-Audit:
    name: 🛡️ Dependency Audit
    needs: IaC-Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm audit --audit-level=high

  Unit-Tests:
    name: 🧪 Unit Test (Node ${{ matrix.node-version }})
    needs: IaC-Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm install
      - name: Run Tests
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        run: npm test

  # ==========================================
  # TẦNG 3: ĐÓNG GÓI & QUÉT IMAGE (BUILD STACK)
  # ==========================================
  Build-Docker:
    name: 📦 Build Container
    needs: [Linter, Secrets-Scan, Software-Audit, Unit-Tests] # Chốt chặn Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase Repo Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  Vulnerability-Scan:
    name: 🦠 Container Security Scan
    needs: Build-Docker
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase Repo Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Run Trivy Scan (Simulated)
        run: |
          echo "🔍 Đang quét lổ hổng của Image: ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "✅ Không tìm thấy lổ hổng nghiêm trọng (Critical vulnerabilities: 0)"

  # ==========================================
  # TẦNG 4: TRIỂN KHAI LIÊN TỤC (CD FLOW)
  # ==========================================
  Deploy-Staging:
    name: 🏗️ Deploy Staging
    needs: Vulnerability-Scan
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deployment
        run: echo "🚀 Code đã lên Staging Cluster."

  Quality-Check-Smoke:
    name: 💨 Smoke Test
    needs: Deploy-Staging
    runs-on: ubuntu-latest
    steps:
      - name: Check Health
        run: |
          echo "🔍 Kiểm tra API Health Check..."
          sleep 3
          echo "✅ API trả về trạng thái Ready."

  Deploy-Production:
    name: 🚀 Deploy Production
    needs: Quality-Check-Smoke
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # 🛑 Cần Manual approval
    steps:
      - name: Final Production Deploy
        run: echo "🌟 ĐÃ LÊN PRODUCTION THÀNH CÔNG!"

  # ==========================================
  # TẦNG 5: QUẢN LÝ PHÁT HÀNH (RELEASE)
  # ==========================================
  Create-Release:
    name: 🏷️ Auto GitHub Release
    needs: Deploy-Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Tag
        run: |
          echo "📦 Đang tạo GitHub Release cho phiên bản mới..."
          echo "✅ Release v1.0.${{ github.run_number }} đã được tạo."
