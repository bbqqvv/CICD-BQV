name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Sử dụng Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Cài đặt dependencies
      run: npm install
      
    - name: Kiểm tra chất lượng code (Lint)
      run: npm run lint
      
    - name: Chạy các bài kiểm tra (Tests)
      run: npm test

    - name: Thiết lập Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (Thử nghiệm)
      run: docker build -t hello-cicd:latest .
