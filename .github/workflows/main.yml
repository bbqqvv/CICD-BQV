name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  # 🧪 CHẶNG 1: KIỂM THỬ (CI)
  CI-Test:
    name: 🧪 Unit Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Linting
        run: npm run lint
      - name: Run Tests
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        run: npm test

  # 📦 CHẶNG 2: ĐÓNG GÓI (Build)
  Build-Artifact:
    name: 📦 Build Docker Image
    needs: CI-Test # Phải qua môn Test mới được đóng gói
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase Repo Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🏗️ CHẶNG 3: TRIỂN KHAI THỬ NGHIỆM (Staging)
  Deploy-Staging:
    name: 🏗️ Deploy to Staging
    needs: Build-Artifact
    runs-on: ubuntu-latest
    environment: staging # Gắn nhãn môi trường
    steps:
      - name: Mô phỏng Deploy
        run: |
          echo "🚀 Đang kéo Image từ GHCR..."
          echo "✅ Đã triển khai lên cụm Server Staging (Môi trường kiểm thử)"

  # 🚀 CHẶNG 4: TRIỂN KHAI THẬT (Production)
  Deploy-Production:
    name: 🚀 Deploy to Production
    needs: Deploy-Staging
    if: github.ref == 'refs/heads/main' # Chỉ cho phép deploy Prod từ nhánh main
    runs-on: ubuntu-latest
    environment: production # 🛑 Đây là nơi sẽ yêu cầu Manual Approval trên GitHub
    steps:
      - name: Mô phỏng Deploy
        run: |
          echo "🌟 CHÚC MỪNG! Code của bạn đã lên môi trường Production cho hàng triệu người dùng."
          echo "✅ Hoàn tất chu trình CI/CD Enterprise."
