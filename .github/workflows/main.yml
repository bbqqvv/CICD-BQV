name: Extreme Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  # 🔍 NHÁNH 1: KIỂM TRA ĐỊNH DẠNG (LINT)
  Static-Analysis:
    name: 🔍 Linting Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  # 🛡️ NHÁNH 2: QUÉT BẢO MẬT (SECURITY)
  Security-Scan:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Check for Vulnerabilities
        run: npm audit --audit-level=high # Chỉ báo lỗi nếu có lỗ hổng nghiêm trọng

  # 🧪 NHÁNH 3: KIỂM THỬ ĐA PHIÊN BẢN (MATRIX)
  Unit-Tests:
    name: 🧪 Test trên Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x] # Tủa ra 3 node con chạy song song
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm install
      - name: Run Integration Tests
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        run: npm test

  # 📦 HỘI TỤ: ĐÓNG GÓI (BUILD)
  Build-and-Push:
    name: 📦 Build & Push Docker
    needs: [Static-Analysis, Security-Scan, Unit-Tests] # Đợi cả 3 nhánh trên thành công
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase Repo Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🏗️ TRIỂN KHAI STAGING
  Deploy-Staging:
    name: 🏗️ Deploy Staging
    needs: Build-and-Push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Fake Deploy
        run: echo "🚀 Đã triển khai lên cụm server Staging"

  # 💨 KIỂM TRA NHANH (SMOKE TEST)
  Smoke-Test:
    name: 💨 Smoke Test (Health Check)
    needs: Deploy-Staging
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        run: |
          echo "🔍 Đang kiểm tra trạng thái API..."
          sleep 5
          echo "✅ API phản hồi tốt (HTTP 200 OK)"

  # 🚀 TRIỂN KHAI PRODUCTION (Yêu cầu duyệt tay)
  Deploy-Production:
    name: 🚀 Deploy Production
    needs: Smoke-Test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Final Deploy
        run: |
          echo "🌟 MISSION ACCOMPLISHED: Code đã lên Production!"
